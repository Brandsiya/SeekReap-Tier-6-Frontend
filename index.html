<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeekReap - Video Verification</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">SeekReap</a>
            <div class="nav-links">
                <a href="/" class="nav-link active">Upload</a>
                <a href="/dashboard.html" class="nav-link">Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="upload-card">
            <h1>Upload Video for Verification</h1>
            
            <div class="upload-section">
                <h3>Option 1: Upload Video File</h3>
                <input type="file" id="fileInput" accept="video/*" class="file-input">
                <div id="fileName" class="file-name"></div>
            </div>

            <div class="upload-section">
                <h3>Option 2: YouTube URL</h3>
                <input type="url" id="urlInput" placeholder="https://youtube.com/watch?v=..." class="url-input">
            </div>

            <button id="submitBtn" class="submit-btn">Submit</button>
            <div id="status" class="status-message"></div>
        </div>

        <div id="results" class="results-card" style="display: none;">
            <h2>Verification Results</h2>
            <div id="jobDetails" class="job-details"></div>
            <div id="progress" class="progress-container" style="display: none;">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div id="resultData" class="result-data"></div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
