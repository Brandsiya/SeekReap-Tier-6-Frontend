<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Loading SeekReap...</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/index.css">
</head>
<body>

  <!-- Top: Brand (icon + wordmark as one unit) -->
  <div class="top-section">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 200 200" fill="none">
        <defs>
          <!-- S: white → gold-light (same as .brand-seek) -->
          <linearGradient id="lGS" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#FAFAF8"/>
            <stop offset="100%" stop-color="#E8C06A"/>
          </linearGradient>
          <!-- R: gold → gold-dark (same as .brand-reap) -->
          <linearGradient id="lGR" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#C9993A"/>
            <stop offset="100%" stop-color="#9B7520"/>
          </linearGradient>
        </defs>
        <g stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M100 50 L100 60 M97 55 L103 65 M93 60 L107 72 M88 75 L112 85 M85 90 L115 92"
                stroke="url(#lGR)" opacity="0.9"/>
          <path d="M85 105 L115 105 M88 115 L112 115 M93 125 L107 125 M97 135 L103 135 M100 140 L100 150"
                stroke="url(#lGR)"/>
          <circle cx="100" cy="100" r="3" fill="url(#lGS)" opacity="0.8"/>
        </g>
        <text x="65"  y="175" font-size="80" font-weight="700" fill="url(#lGS)" opacity="0.95">S</text>
        <text x="115" y="175" font-size="80" font-weight="700" fill="url(#lGR)">R</text>
      </svg>
      <span class="brand-name">
        <span class="brand-seek">Seek</span><span class="brand-reap">Reap</span>
      </span>
    </div>
  </div>

  <!-- Middle: Spinner with percentage -->
  <div class="middle-section">
    <div class="sr-loader">
      <div class="loader-ring"></div>
      <div class="loader-inner"></div>
      <div class="percentage-counter" id="percentageCounter">0%</div>
    </div>
  </div>

  <!-- Bottom: Progress bar -->
  <div class="bottom-section">
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>
  <script src="/assets/js/index.js"></script>
</body>
</html>
