<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Password · SeekReap</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/signup_signin.css">
  <style>
    .update-success { background: rgba(76, 175, 80, 0.1); border: 1px solid rgba(76, 175, 80, 0.3); color: #4CAF50; }
    .update-error { background: rgba(244, 67, 54, 0.1); border: 1px solid rgba(244, 67, 54, 0.3); color: #f44336; }
    .update-info { background: rgba(33, 150, 243, 0.1); border: 1px solid rgba(33, 150, 243, 0.3); color: #2196F3; }
  </style>
</head>
<body>
  <div class="auth-card" style="max-width: 440px;">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 200 200" fill="none">
        <defs>
          <linearGradient id="aGS" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FAFAF8"/>
            <stop offset="100%" stop-color="#E8C06A"/>
          </linearGradient>
          <linearGradient id="aGR" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C9993A"/>
            <stop offset="100%" stop-color="#9B7520"/>
          </linearGradient>
        </defs>
        <g stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M100 50 L100 60 M97 55 L103 65 M93 60 L107 72 M88 75 L112 85 M85 90 L115 92" stroke="url(#aGR)" opacity="0.9"/>
          <path d="M85 105 L115 105 M88 115 L112 115 M93 125 L107 125 M97 135 L103 135 M100 140 L100 150" stroke="url(#aGR)"/>
          <circle cx="100" cy="100" r="3" fill="url(#aGS)" opacity="0.8"/>
        </g>
        <text x="65" y="175" font-size="80" font-weight="700" fill="url(#aGS)" opacity="0.95">S</text>
        <text x="115" y="175" font-size="80" font-weight="700" fill="url(#aGR)">R</text>
      </svg>
      <span class="brand-name"><span class="brand-seek">Seek</span><span class="brand-reap">Reap</span></span>
    </div>

    <h2 class="frm-title">Update Password</h2>

    <div id="message-container"></div>

    <div class="input-group">
      <label>New Password</label>
      <div class="input-wrapper">
        <i class="fas fa-lock field-icon"></i>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
        <i class="fas fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
      </div>
    </div>

    <div class="input-group">
      <label>Confirm New Password</label>
      <div class="input-wrapper">
        <i class="fas fa-lock field-icon"></i>
        <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password">
        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirm', this)"></i>
      </div>
    </div>

    <ul class="validation-hints" style="font-size:0.85rem; margin-bottom:16px; color:#9B7520; list-style:none; padding-left:0;">
      <li><span id="hint-length" class="hint-pending">At least 8 characters</span></li>
      <li><span id="hint-lowercase" class="hint-pending">At least 1 lowercase letter</span></li>
      <li><span id="hint-uppercase" class="hint-pending">At least 1 uppercase letter</span></li>
      <li><span id="hint-digit" class="hint-pending">At least 1 number</span></li>
      <li><span id="hint-match" class="hint-pending">Both passwords match</span></li>
    </ul>

    <button class="auth-btn" id="update-btn" disabled>
      <i class="fas fa-key"></i> Update Password
    </button>

    <div style="text-align: center; margin-top: 1.5rem;">
      <a href="signup_signin.html" class="switch-link">Back to Sign In</a>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <script>
    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
      icon.classList.toggle('fa-eye');
      icon.classList.toggle('fa-eye-slash');
    }

    function validatePassword(pw, conf) {
      const minLength = pw.length >= 8;
      const hasLower = /[a-z]/.test(pw);
      const hasUpper = /[A-Z]/.test(pw);
      const hasDigit = /\d/.test(pw);
      const match = pw === conf;

      const hint = (id, ok) => {
        const el = document.getElementById(id);
        el.classList.remove('hint-pending', 'hint-ok', 'hint-invalid');
        el.classList.add(ok ? 'hint-ok' : 'hint-invalid');
      };

      hint('hint-length', minLength);
      hint('hint-lowercase', hasLower);
      hint('hint-uppercase', hasUpper);
      hint('hint-digit', hasDigit);
      hint('hint-match', match);

      return minLength && hasLower && hasUpper && hasDigit && match;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const pwdInput = document.getElementById('password');
      const confInput = document.getElementById('confirm');
      const updateBtn = document.getElementById('update-btn');
      const msgContainer = document.getElementById('message-container');

      function showMessage(text, type) {
        msgContainer.innerHTML = `
          <div class="message update-${type}">
            <i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i>
            ${text}
            <button class="close-btn" onclick="this.parentElement.remove()">×</button>
          </div>
        `;
      }

      const hashParams = new URLSearchParams(window.location.hash.slice(1));
      const access_token = hashParams.get('access_token');
      const refresh_token = hashParams.get('refresh_token');
      const type = hashParams.get('type');

      if (!type || type !== 'recovery') {
        showMessage('Invalid or expired reset link.', 'error');
        updateBtn.disabled = true;
        return;
      }

      const { data: sessionData, error: sessionError } = await window.supabaseClient.auth.setSession({
        access_token,
        refresh_token
      });

      if (sessionError) {
        showMessage('Session setup failed: ' + sessionError.message, 'error');
        updateBtn.disabled = true;
        return;
      }

      pwdInput.addEventListener('input', () => {
        validatePassword(pwdInput.value, confInput.value);
        updateBtn.disabled = !validatePassword(pwdInput.value, confInput.value);
      });
      confInput.addEventListener('input', () => {
        validatePassword(pwdInput.value, confInput.value);
        updateBtn.disabled = !validatePassword(pwdInput.value, confInput.value);
      });

      updateBtn.addEventListener('click', async () => {
        const password = pwdInput.value;
        const confirm = confInput.value;

        if (!password || !confirm) {
          showMessage('Please fill all fields.', 'error');
          return;
        }

        if (!validatePassword(password, confirm)) {
          showMessage('Please fix password requirements above.', 'error');
          return;
        }

        updateBtn.disabled = true;
        updateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

        try {
          const { data, error } = await window.supabaseClient.auth.updateUser({
            password
          });

          if (error) throw error;

          showMessage('Password updated successfully! You will be logged in automatically.', 'success');
          confInput.value = '';
          pwdInput.value = '';

          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);

        } catch (error) {
          console.error('Password update error:', error);
          showMessage(error.message || 'Something went wrong.', 'error');
          updateBtn.disabled = false;
          updateBtn.innerHTML = '<i class="fas fa-key"></i> Update Password';
        }
      });
    });
  </script>
</body>
</html>
