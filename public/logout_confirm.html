<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SeekReap · Sign Out</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/signup_signin.css">
  <style>
    .logout-icon { font-size: 2.6rem; text-align: center; display: block; margin-bottom: 16px; }
    .btn-row { display: flex; gap: 12px; margin-top: 4px; }
    .btn-row .auth-btn { flex: 1; }
    .btn-cancel {
      flex: 1;
      padding: 15px;
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      background: transparent;
      color: var(--white-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-cancel:hover { background: var(--white-faint); color: var(--white); }
    .btn-confirm {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #E05A5A, #B03030);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 18px rgba(224,90,90,0.3);
    }
    .btn-confirm:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>
  <div class="particle" style="width:2px;height:2px;left:20%;animation-duration:25s;animation-delay:-4s;"></div>
  <div class="particle" style="width:1px;height:1px;left:55%;animation-duration:20s;animation-delay:-8s;"></div>
  <div class="particle" style="width:2px;height:2px;left:82%;animation-duration:30s;animation-delay:-15s;"></div>

  <div class="auth-card">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 200 200" fill="none">
        <defs>
          <linearGradient id="cGS" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FAFAF8"/><stop offset="100%" stop-color="#E8C06A"/>
          </linearGradient>
          <linearGradient id="cGR" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C9993A"/><stop offset="100%" stop-color="#9B7520"/>
          </linearGradient>
        </defs>
        <g stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M100 50 L100 60 M97 55 L103 65 M93 60 L107 72 M88 75 L112 85 M85 90 L115 92" stroke="url(#cGR)" opacity="0.9"/>
          <path d="M85 105 L115 105 M88 115 L112 115 M93 125 L107 125 M97 135 L103 135 M100 140 L100 150" stroke="url(#cGR)"/>
          <circle cx="100" cy="100" r="3" fill="url(#cGS)" opacity="0.8"/>
        </g>
        <text x="65" y="175" font-size="80" font-weight="700" fill="url(#cGS)" opacity="0.95">S</text>
        <text x="115" y="175" font-size="80" font-weight="700" fill="url(#cGR)">R</text>
      </svg>
      <span class="brand-name"><span class="brand-seek">Seek</span><span class="brand-reap">Reap</span></span>
    </div>

    <div id="message-container"></div>

    <div class="auth-form" style="text-align:center;">
      <span class="logout-icon">🔓</span>
      <h2 class="form-title">Sign <span>Out</span>?</h2>
      <p style="color:var(--white-dim);font-size:0.9rem;margin-bottom:32px;">
        You'll need to sign in again to access your dashboard and content.
      </p>

      <div class="btn-row">
        <button class="btn-cancel" id="cancel-btn" onclick="goBack()">
          Cancel
        </button>
        <button class="btn-confirm" id="confirm-btn" onclick="confirmLogout()">
          <i class="fas fa-arrow-right-from-bracket"></i> Sign Out
        </button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <script>
    function getClient() {
      if (window.supabaseClient) return Promise.resolve(window.supabaseClient);
      return new Promise((resolve, reject) => {
        const t = setTimeout(() => reject(new Error('Auth unavailable')), 6000);
        document.addEventListener('supabaseReady', () => { clearTimeout(t); resolve(window.supabaseClient); }, { once: true });
      });
    }

    function showMsg(text, type = 'error') {
      const el = document.getElementById('message-container');
      el.innerHTML = `<div class="msg msg-${type}"><i class="fas fa-info-circle"></i><span>${text}</span></div>`;
    }

    function goBack() {
      if (document.referrer && !document.referrer.includes('logout')) {
        history.back();
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    async function confirmLogout() {
      const btn = document.getElementById('confirm-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing out…';
      try {
        const sb = await getClient();
        const { error } = await sb.auth.signOut();
        if (error) throw error;
        window.location.replace('signup_signin.html');
      } catch (err) {
        showMsg(err.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-arrow-right-from-bracket"></i> Sign Out';
      }
    }
  </script>
</body>
</html>
