<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SeekReap · Verify Your Email</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/signup_signin.css">
  <style>
    .verify-icon { font-size: 3rem; margin-bottom: 20px; display: block; text-align: center; }
    .verify-email { font-weight: 600; color: var(--gold-light); word-break: break-all; }
    .step { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0;
            border-bottom: 1px solid var(--white-faint); color: var(--white-dim); font-size: 0.88rem; }
    .step:last-child { border-bottom: none; }
    .step i { color: var(--gold); margin-top: 2px; width: 16px; flex-shrink: 0; }
    .steps { margin: 20px 0 28px; }
    .resend-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    .resend-row small { color: var(--white-dim); font-size: 0.8rem; }
    .poll-badge { display: inline-flex; align-items: center; gap: 6px;
                  font-size: 0.78rem; color: var(--gold); margin-top: 12px; }
    .pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold);
                 animation: pulseDot 1.5s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  </style>
</head>
<body>
  <div class="particle" style="width:2px;height:2px;left:8%;animation-duration:22s;animation-delay:0s;"></div>
  <div class="particle" style="width:1px;height:1px;left:33%;animation-duration:19s;animation-delay:-3s;"></div>
  <div class="particle" style="width:2px;height:2px;left:67%;animation-duration:26s;animation-delay:-9s;"></div>
  <div class="particle" style="width:2px;height:2px;left:88%;animation-duration:24s;animation-delay:-14s;"></div>

  <div class="auth-card">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 200 200" fill="none">
        <defs>
          <linearGradient id="aGS" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FAFAF8"/><stop offset="100%" stop-color="#E8C06A"/>
          </linearGradient>
          <linearGradient id="aGR" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C9993A"/><stop offset="100%" stop-color="#9B7520"/>
          </linearGradient>
        </defs>
        <g stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M100 50 L100 60 M97 55 L103 65 M93 60 L107 72 M88 75 L112 85 M85 90 L115 92" stroke="url(#aGR)" opacity="0.9"/>
          <path d="M85 105 L115 105 M88 115 L112 115 M93 125 L107 125 M97 135 L103 135 M100 140 L100 150" stroke="url(#aGR)"/>
          <circle cx="100" cy="100" r="3" fill="url(#aGS)" opacity="0.8"/>
        </g>
        <text x="65" y="175" font-size="80" font-weight="700" fill="url(#aGS)" opacity="0.95">S</text>
        <text x="115" y="175" font-size="80" font-weight="700" fill="url(#aGR)">R</text>
      </svg>
      <span class="brand-name"><span class="brand-seek">Seek</span><span class="brand-reap">Reap</span></span>
    </div>

    <div id="message-container"></div>

    <div class="auth-form">
      <span class="verify-icon">✉️</span>
      <h2 class="form-title" style="text-align:center;">Check Your <span>Inbox</span></h2>
      <p style="color:var(--white-dim);font-size:0.9rem;text-align:center;margin-bottom:6px;">
        We sent a confirmation link to
      </p>
      <p style="text-align:center;margin-bottom:20px;">
        <span class="verify-email" id="pendingEmail">your email address</span>
      </p>

      <div class="steps">
        <div class="step"><i class="fas fa-envelope-open-text"></i><span>Open the email from SeekReap</span></div>
        <div class="step"><i class="fas fa-mouse-pointer"></i><span>Click the <strong style="color:var(--white)">Confirm your email</strong> link</span></div>
        <div class="step"><i class="fas fa-arrow-right"></i><span>You'll be signed in automatically</span></div>
      </div>

      <div class="resend-row">
        <button class="auth-btn" id="resend-btn" style="flex:1;padding:14px 0;" onclick="resendEmail()">
          <i class="fas fa-paper-plane"></i> Resend Email
        </button>
      </div>
      <div class="poll-badge"><span class="pulse-dot"></span><span id="poll-label">Waiting for confirmation…</span></div>

      <div class="switch-link" style="margin-top:24px;">
        Wrong email? <a href="signup_signin.html">Back to Sign In</a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <script>
    // Show the pending email
    const pendingEmail = sessionStorage.getItem('pendingVerifyEmail') || '';
    if (pendingEmail) document.getElementById('pendingEmail').textContent = pendingEmail;

    function showMsg(text, type) {
      const el = document.getElementById('message-container');
      const icon = type === 'success' ? 'check-circle' : type === 'info' ? 'info-circle' : 'exclamation-circle';
      el.innerHTML = `<div class="msg msg-${type}"><i class="fas fa-${icon}"></i><span>${text}</span></div>`;
    }

    async function resendEmail() {
      const btn = document.getElementById('resend-btn');
      if (!pendingEmail) return showMsg('No email address stored. Please sign up again.', 'error');
      btn.disabled = true; btn.style.opacity = '0.6';
      try {
        const sb = await getClient();
        const { error } = await sb.auth.resend({ type: 'signup', email: pendingEmail });
        if (error) throw error;
        showMsg('Confirmation email resent! Check your inbox.', 'success');
      } catch (err) {
        showMsg(err.message, 'error');
      } finally {
        setTimeout(() => { btn.disabled = false; btn.style.opacity = '1'; }, 30000);
      }
    }

    function getClient() {
      if (window.supabaseClient) return Promise.resolve(window.supabaseClient);
      return new Promise((resolve, reject) => {
        const t = setTimeout(() => reject(new Error('Auth unavailable')), 6000);
        document.addEventListener('supabaseReady', () => { clearTimeout(t); resolve(window.supabaseClient); }, { once: true });
      });
    }

    // Poll every 4s for email confirmation
    async function poll() {
      try {
        const sb = await getClient();
        const { data: { session } } = await sb.auth.getSession();
        if (session?.user?.email_confirmed_at) {
          document.getElementById('poll-label').textContent = '✅ Verified! Redirecting…';
          setTimeout(() => { window.location.href = '/certification_portal.html'; }, 1200);
          return;
        }
      } catch (_) {}
      setTimeout(poll, 4000);
    }

    // Start polling once Supabase is ready
    document.addEventListener('supabaseReady', poll, { once: true });
    if (window.supabaseClient) poll();
  </script>
</body>
</html>
