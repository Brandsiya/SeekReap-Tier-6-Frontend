<DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SeekReap · Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/signup_signin.css">
</head>
<body>
  <div class="particle" style="width:2px;height:2px;left:15%;animation-duration:22s;animation-delay:0s;"></div>
  <div class="particle" style="width:1px;height:1px;left:50%;animation-duration:19s;animation-delay:-5s;"></div>
  <div class="particle" style="width:2px;height:2px;left:80%;animation-duration:28s;animation-delay:-12s;"></div>

  <div class="auth-card">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 200 200" fill="none">
        <defs>
          <linearGradient id="bGS" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FAFAF8"/><stop offset="100%" stop-color="#E8C06A"/>
          </linearGradient>
          <linearGradient id="bGR" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C9993A"/><stop offset="100%" stop-color="#9B7520"/>
          </linearGradient>
        </defs>
        <g stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M100 50 L100 60 M97 55 L103 65 M93 60 L107 72 M88 75 L112 85 M85 90 L115 92" stroke="url(#bGR)" opacity="0.9"/>
          <path d="M85 105 L115 105 M88 115 L112 115 M93 125 L107 125 M97 135 L103 135 M100 140 L100 150" stroke="url(#bGR)"/>
          <circle cx="100" cy="100" r="3" fill="url(#bGS)" opacity="0.8"/>
        </g>
        <text x="65" y="175" font-size="80" font-weight="700" fill="url(#bGS)" opacity="0.95">S</text>
        <text x="115" y="175" font-size="80" font-weight="700" fill="url(#bGR)">R</text>
      </svg>
      <span class="brand-name"><span class="brand-seek">Seek</span><span class="brand-reap">Reap</span></span>
    </div>

    <div id="message-container"></div>

    <!-- VIEW A: Request reset link -->
    <div id="view-request" class="auth-form">
      <h2 class="form-title">Reset <span>Password</span></h2>
      <p style="color:var(--white-dim);font-size:0.9rem;margin-bottom:24px;">
        Enter your account email and we'll send a secure reset link.
      </p>

      <div class="input-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope field-icon"></i>
          <input type="email" id="reset-email" placeholder="creator@seekreap.io" autocomplete="email">
        </div>
      </div>

      <button class="auth-btn" id="reset-btn" onclick="requestReset()">
        <i class="fas fa-paper-plane"></i> Send Reset Link
      </button>

      <div class="switch-link">
        Remembered it? <a href="signup_signin.html">Back to Sign In</a>
      </div>
    </div>

    <!-- VIEW B: Set new password (after clicking email link) -->
    <div id="view-newpass" class="auth-form hidden">
      <h2 class="form-title">New <span>Password</span></h2>
      <p style="color:var(--white-dim);font-size:0.9rem;margin-bottom:24px;">
        Choose a strong password for your account.
      </p>

      <div class="input-group">
        <label>New Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock field-icon"></i>
          <input type="password" id="new-password" placeholder="At least 8 characters" autocomplete="new-password">
          <i class="fas fa-eye toggle-password" onclick="togglePassword('new-password', this)"></i>
        </div>
      </div>

      <div class="input-group">
        <label>Confirm New Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock field-icon"></i>
          <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password">
          <i class="fas fa-eye toggle-password" onclick="togglePassword('confirm-password', this)"></i>
        </div>
      </div>

      <button class="auth-btn" id="update-btn" onclick="updatePassword()">
        <i class="fas fa-shield-halved"></i> Update Password
      </button>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <script>
    function getClient() {
      if (window.supabaseClient) return Promise.resolve(window.supabaseClient);
      return new Promise((resolve, reject) => {
        const t = setTimeout(() => reject(new Error('Auth unavailable')), 6000);
        document.addEventListener('supabaseReady', () => { clearTimeout(t); resolve(window.supabaseClient); }, { once: true });
      });
    }

    function showMsg(text, type = 'error') {
      const el = document.getElementById('message-container');
      const icon = { error: 'exclamation-circle', success: 'check-circle', info: 'info-circle' }[type] || 'info-circle';
      el.innerHTML = `<div class="msg msg-${type}"><i class="fas fa-${icon}"></i><span>${text}</span></div>`;
    }

    function setBusy(id, busy) {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.disabled = busy; btn.style.opacity = busy ? '0.6' : '1';
    }

    function togglePassword(id, icon) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      icon.classList.toggle('fa-eye'); icon.classList.toggle('fa-eye-slash');
    }

    // Detect recovery token in URL hash (e.g. #access_token=...&type=recovery)
    window.addEventListener('load', () => {
      const hash   = window.location.hash;
      const params = new URLSearchParams(hash.replace(/^#/, ''));
      if (params.get('type') === 'recovery' || params.get('access_token')) {
        document.getElementById('view-request').classList.add('hidden');
        document.getElementById('view-newpass').classList.remove('hidden');
      }
    });

    async function requestReset() {
      const email = (document.getElementById('reset-email')?.value || '').trim();
      if (!email) return showMsg('Please enter your email address.');

      setBusy('reset-btn', true);
      try {
        const sb = await getClient();
        const redirectTo = `${window.location.origin}/reset_password.html`;
        const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });
        if (error) throw error;
        showMsg('Reset link sent! Check your inbox (and spam folder).', 'success');
        document.getElementById('reset-email').value = '';
      } catch (err) {
        showMsg(err.message);
      } finally {
        setBusy('reset-btn', false);
      }
    }

    async function updatePassword() {
      const password = document.getElementById('new-password')?.value || '';
      const confirm  = document.getElementById('confirm-password')?.value || '';

      if (password.length < 8) return showMsg('Password must be at least 8 characters.');
      if (password !== confirm) return showMsg('Passwords do not match.');

      setBusy('update-btn', true);
      try {
        const sb = await getClient();
        const { error } = await sb.auth.updateUser({ password });
        if (error) throw error;
        showMsg('Password updated successfully! Redirecting…', 'success');
        setTimeout(() => { window.location.href = 'signup_signin.html'; }, 2000);
      } catch (err) {
        showMsg(err.message);
      } finally {
        setBusy('update-btn', false);
      }
    }
  </script>
</body>
</html>
