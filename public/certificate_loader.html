<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Certificate Loader · SeekReap</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(201,153,58,0.08) 0%, transparent 60%),
                  linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #FAFAF8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    .loader-container {
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .loader-card {
      background: rgba(17, 17, 21, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(201, 153, 58, 0.25);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: all 0.3s ease;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 48px;
      height: 48px;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FAFAF8 0%, #E8C06A 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .icon-container {
      margin-bottom: 32px;
    }

    .cert-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(201, 153, 58, 0.15), rgba(201, 153, 58, 0.05));
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .cert-icon i {
      font-size: 48px;
      color: #C9993A;
    }

    h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #FAFAF8, #C9993A);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .subtitle {
      color: rgba(250, 250, 248, 0.65);
      font-size: 0.9rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .input-group {
      margin-bottom: 24px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #C9993A;
      margin-bottom: 8px;
    }

    .cert-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .cert-input-wrapper i {
      position: absolute;
      left: 16px;
      color: #C9993A;
      font-size: 1rem;
    }

    .cert-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: rgba(24, 24, 30, 0.9);
      border: 1px solid rgba(201, 153, 58, 0.25);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: #FAFAF8;
      transition: all 0.2s;
      outline: none;
    }

    .cert-input:focus {
      border-color: #C9993A;
      box-shadow: 0 0 0 3px rgba(201, 153, 58, 0.1);
      background: rgba(34, 34, 40, 0.9);
    }

    .cert-input::placeholder {
      color: rgba(250, 250, 248, 0.35);
    }

    .upload-area {
      border: 2px dashed rgba(201, 153, 58, 0.3);
      border-radius: 16px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      background: rgba(24, 24, 30, 0.5);
      margin-bottom: 24px;
    }

    .upload-area:hover {
      border-color: #C9993A;
      background: rgba(201, 153, 58, 0.05);
    }

    .upload-area i {
      font-size: 48px;
      color: #C9993A;
      margin-bottom: 12px;
      display: block;
    }

    .upload-area p {
      color: rgba(250, 250, 248, 0.65);
      font-size: 0.85rem;
    }

    .upload-area .small {
      font-size: 0.7rem;
      margin-top: 8px;
      color: rgba(250, 250, 248, 0.4);
    }

    #fileInput {
      display: none;
    }

    .file-info {
      background: rgba(201, 153, 58, 0.1);
      border: 1px solid rgba(201, 153, 58, 0.2);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .file-name {
      font-size: 0.85rem;
      color: #FAFAF8;
      word-break: break-all;
    }

    .file-name i {
      color: #C9993A;
      margin-right: 8px;
    }

    .remove-file {
      background: rgba(224, 85, 85, 0.2);
      border: 1px solid rgba(224, 85, 85, 0.3);
      color: #E05555;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.7rem;
      transition: all 0.2s;
    }

    .remove-file:hover {
      background: rgba(224, 85, 85, 0.3);
      border-color: #E05555;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .btn-primary {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #C9993A 0%, #E8C06A 50%, #C9993A 100%);
      background-size: 200% 200%;
      color: #08080A;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .btn-primary:hover:not(:disabled) {
      background-position: right center;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(201, 153, 58, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: transparent;
      border: 1px solid rgba(201, 153, 58, 0.4);
      color: #FAFAF8;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 13px 24px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      border-color: #C9993A;
      background: rgba(201, 153, 58, 0.1);
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(8, 8, 10, 0.95);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .loading-overlay.active {
      display: flex;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(201, 153, 58, 0.2);
      border-top: 3px solid #C9993A;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    .loading-text {
      color: #FAFAF8;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .loading-text span {
      color: #C9993A;
    }

    .error-message {
      background: rgba(224, 85, 85, 0.15);
      border: 1px solid rgba(224, 85, 85, 0.3);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
      color: #E05555;
      font-size: 0.85rem;
    }

    .error-message.show {
      display: flex;
    }

    .error-message i {
      font-size: 1rem;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: rgba(250, 250, 248, 0.3);
      font-size: 0.75rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(201, 153, 58, 0.15);
    }

    .divider span {
      margin: 0 10px;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.9;
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loader-card {
      animation: fadeIn 0.5s ease-out;
    }

    @media (max-width: 480px) {
      .loader-card {
        padding: 32px 24px;
      }
      
      .brand-name {
        font-size: 1.5rem;
      }
      
      h2 {
        font-size: 1.4rem;
      }
      
      .button-group {
        flex-direction: column;
      }
    }
  
    /* ── RESPONSIVE IMPROVEMENTS ── */
    @media (max-width: 360px) {
      body { padding: 12px 10px; }
      .loader-container { padding: 0; }
      .main-title { font-size: 1.6rem; }
      .progress-container { padding: 14px 12px; }
      .loader-steps { flex-direction: column; gap: 4px; }
      .loader-step { min-width: auto; padding: 8px 4px; font-size: 0.68rem; }
      .loader-step::before { display: none; }
      .spinner { width: 40px; height: 40px; }
      .status-message { flex-direction: column; gap: 6px; align-items: flex-start; padding: 10px 12px; }
      .qr-code { width: 120px; height: 120px; }
      .btn-primary { padding: 13px 20px; font-size: 0.85rem; }
    }

    @media (max-width: 480px) {
      .loader-steps { flex-wrap: wrap; justify-content: center; gap: 4px; }
      .loader-step { min-width: 80px; flex: none; }
      .qr-container { gap: 12px; }
      .status-message { font-size: 0.8rem; }
      .logo-text { font-size: 1.4rem; }
    }

    @media (min-width: 481px) and (max-width: 767px) {
      .loader-steps { justify-content: space-around; }
      .loader-container { max-width: 480px; }
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .loader-container { max-width: 560px; }
      .loader-steps { justify-content: space-between; }
      .status-messages { flex-direction: column; }
    }

    @media (min-width: 1024px) {
      .loader-container { max-width: 620px; }
      .progress-container { padding: 36px; }
      .status-messages { gap: 14px; }
    }

    /* Fix loader-step dots on small screens */
    @media (max-width: 600px) {
      .loader-step { text-align: center; justify-content: center; }
    }

    /* QR section full-width on mobile */
    @media (max-width: 480px) {
      .qr-section { padding: 16px; }
      .btn-primary { width: 100%; justify-content: center; }
    }
    
  </style>
</head>
<body>
  <div class="loader-container">
    <div class="loader-card">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 100 100" fill="none">
          <defs>
            <linearGradient id="loaderS" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#FAFAF8"/>
              <stop offset="100%" stop-color="#E8C06A"/>
            </linearGradient>
            <linearGradient id="loaderR" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#C9993A"/>
              <stop offset="100%" stop-color="#9B7520"/>
            </linearGradient>
          </defs>
          <text x="6" y="72" font-family="Cormorant Garamond, serif" font-size="60" font-weight="700" fill="url(#loaderS)">S</text>
          <text x="52" y="72" font-family="Cormorant Garamond, serif" font-size="60" font-weight="700" fill="url(#loaderR)">R</text>
        </svg>
        <span class="brand-name">SeekReap</span>
      </div>

      <div class="icon-container">
        <div class="cert-icon">
          <i class="fas fa-certificate"></i>
        </div>
      </div>

      <h2>Load Certificate</h2>
      <p class="subtitle">Enter your certificate ID or upload a certificate file to verify and view your blockchain-timestamped proof of ownership</p>

      <div class="error-message" id="errorMessage">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="errorText">Invalid certificate ID</span>
      </div>

      <div class="input-group">
        <label><i class="fas fa-hashtag"></i> Certificate ID</label>
        <div class="cert-input-wrapper">
          <i class="fas fa-id-card"></i>
          <input type="text" class="cert-input" id="certIdInput" placeholder="e.g., SR-20260413-8X3K9L2M">
        </div>
      </div>

      <div class="divider">
        <span>or</span>
      </div>

      <div class="upload-area" id="uploadArea">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Click to upload certificate file</p>
        <p class="small">Supports .cert, .json, .txt files (max 5MB)</p>
      </div>
      <input type="file" id="fileInput" accept=".cert,.json,.txt">

      <div id="fileInfo" class="file-info" style="display: none;">
        <span class="file-name"><i class="fas fa-file-certificate"></i> <span id="fileName"></span></span>
        <button class="remove-file" id="removeFileBtn">Remove</button>
      </div>

      <div class="button-group">
        <button class="btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn-primary" id="loadBtn">Load Certificate →</button>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Verifying <span>certificate</span>...</div>
  </div>

  <script>
    const TIER4_URL = 'https://seekreap-tier-4-dev.fly.dev';

    // Read submission_id from URL (?id=xxx) or sessionStorage
    const urlParams  = new URLSearchParams(location.search);
    const submissionId = urlParams.get('id') || '';
    const certIdParam  = urlParams.get('cert') || '';

    // If we have a submission_id, go straight to polling mode
    if (submissionId) {
      startPollingMode(submissionId, certIdParam);
    }

    // ── DOM refs (loader card mode) ───────────────────────────────────────────
    const certIdInput    = document.getElementById('certIdInput');
    const loadBtn        = document.getElementById('loadBtn');
    const cancelBtn      = document.getElementById('cancelBtn');
    const uploadArea     = document.getElementById('uploadArea');
    const fileInput      = document.getElementById('fileInput');
    const fileInfo       = document.getElementById('fileInfo');
    const fileNameSpan   = document.getElementById('fileName');
    const removeFileBtn  = document.getElementById('removeFileBtn');
    const errorMessage   = document.getElementById('errorMessage');
    const errorText      = document.getElementById('errorText');
    const loadingOverlay = document.getElementById('loadingOverlay');

    let selectedFile = null;

    function hideError()         { errorMessage.classList.remove('show'); }
    function showError(msg)      { errorText.textContent = msg; errorMessage.classList.add('show'); setTimeout(()=>errorMessage.classList.remove('show'),4000); }
    function showLoading()       { loadingOverlay.classList.add('active'); }
    function hideLoading()       { loadingOverlay.classList.remove('active'); }

    // ── POLLING MODE (arrived from certification_portal / pay) ────────────────
    function startPollingMode(sid, certId) {
      // Hide the manual-load UI, show a live progress card
      const card = document.querySelector('.loader-card');
      if (!card) return;

      const activeCert = JSON.parse(sessionStorage.getItem('activeCert') || '{}');
      const title = activeCert.title || 'Your work';

      card.innerHTML = `
        <div class="brand" style="justify-content:center;margin-bottom:24px;">
          <svg class="brand-icon" viewBox="0 0 100 100" fill="none">
            <defs>
              <linearGradient id="lS2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FAFAF8"/><stop offset="100%" stop-color="#E8C06A"/></linearGradient>
              <linearGradient id="lR2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#C9993A"/><stop offset="100%" stop-color="#9B7520"/></linearGradient>
            </defs>
            <path d="M50 20 L50 24 M48 22 L52 26 M46 24 L54 30 M44 28 L56 34 M42 34 L58 38 M42 42 L58 42 M44 48 L56 48 M46 54 L54 54 M48 58 L52 58 M50 62 L50 66" stroke="url(#lR2)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8"/>
            <text x="38" y="68" font-family="Cormorant Garamond, serif" font-size="44" font-weight="700" fill="url(#lS2)">S</text>
            <text x="62" y="68" font-family="Cormorant Garamond, serif" font-size="44" font-weight="700" fill="url(#lR2)">R</text>
          </svg>
          <span class="brand-name">SeekReap</span>
        </div>
        <div class="icon-container" id="statusIcon">
          <div class="cert-icon"><i class="fas fa-cog fa-spin" style="font-size:48px;color:#C9993A;"></i></div>
        </div>
        <h2 id="statusTitle">Certifying Your Work</h2>
        <p class="subtitle" id="statusMsg">Analysing and timestamping "<strong>${title}</strong>"…</p>
        <div style="margin:20px 0;">
          <div style="background:rgba(255,255,255,0.08);border-radius:3px;height:6px;overflow:hidden;border:1px solid rgba(201,153,58,0.2);">
            <div id="pollBar" style="height:100%;background:linear-gradient(90deg,#9B7520,#C9993A,#E8C06A);width:15%;border-radius:2px;transition:width 0.8s ease;"></div>
          </div>
          <div style="font-size:0.75rem;color:rgba(250,250,248,0.5);text-align:center;margin-top:6px;" id="pollLabel">Processing…</div>
        </div>
        <div style="font-size:0.72rem;color:rgba(250,250,248,0.4);text-align:center;">
          Certificate ID: <span style="color:#E8C06A;font-family:monospace;">${certId || '—'}</span>
        </div>
      `;

      pollStatus(sid, certId, 0);
    }

    const statusSteps = ['queued','processing','completed','failed'];
    const barWidths   = { queued:15, processing:55, completed:100, failed:100 };
    const statusLabels = {
      queued:     'Job queued — waiting for worker…',
      processing: 'Worker processing — analysing fingerprints…',
      completed:  '✅ Certification complete!',
      failed:     '❌ Certification failed'
    };

    async function pollStatus(sid, certId, attempts) {
      if (attempts > 60) {  // 5 min max
        document.getElementById('statusTitle').textContent = 'Taking longer than expected';
        document.getElementById('statusMsg').textContent   = 'Your certificate is still processing. Check your dashboard.';
        return;
      }
      try {
        const res  = await fetch(TIER4_URL + '/api/certify/' + sid);
        const data = await res.json();
        const st   = data.status || 'queued';

        const bar   = document.getElementById('pollBar');
        const label = document.getElementById('pollLabel');
        if (bar)   bar.style.width   = (barWidths[st] || 30) + '%';
        if (label) label.textContent = statusLabels[st] || st;

        if (st === 'completed') {
          showSuccess(data);
          return;
        }
        if (st === 'failed') {
          showFailed(data);
          return;
        }
      } catch(e) {
        console.warn('Poll error:', e.message);
      }
      setTimeout(() => pollStatus(sid, certId, attempts + 1), 5000);
    }

    function showSuccess(data) {
      const activeCert = JSON.parse(sessionStorage.getItem('activeCert') || '{}');
      const card = document.querySelector('.loader-card');
      const plan = data.plan || activeCert.plan || 'free';
      const certId = data.cert_id || activeCert.cert_id || '—';
      const now = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

      card.innerHTML = `
        <div style="text-align:center;margin-bottom:20px;">
          <div style="width:72px;height:72px;background:rgba(61,184,122,0.15);border:2px solid rgba(61,184,122,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:2rem;">✅</div>
          <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:#3DB87A;margin-bottom:8px;">Certification Complete!</h2>
          <p style="color:rgba(250,250,248,0.65);font-size:0.9rem;">"${data.title || activeCert.title || 'Your work'}" is now blockchain-timestamped</p>
        </div>
        <div style="background:#18181E;border:1px solid rgba(201,153,58,0.25);border-left:3px solid #C9993A;border-radius:4px;padding:18px;margin-bottom:20px;font-size:0.85rem;display:grid;gap:8px;">
          <div><span style="color:rgba(250,250,248,0.5);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;">Certificate ID</span><br><span style="font-family:monospace;color:#E8C06A;">${certId}</span></div>
          <div><span style="color:rgba(250,250,248,0.5);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;">Certified On</span><br>${now}</div>
          <div><span style="color:rgba(250,250,248,0.5);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;">Plan</span><br><span style="text-transform:capitalize;color:#C9993A;">${plan}</span></div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button onclick="window.location.href='dashboard.html'" style="flex:1;padding:12px;background:linear-gradient(135deg,#C9993A,#E8C06A);color:#08080A;border:none;border-radius:4px;font-weight:700;font-size:0.88rem;cursor:pointer;text-transform:uppercase;letter-spacing:0.04em;">
            <i class="fas fa-th-large" style="margin-right:6px;"></i> Dashboard
          </button>
          <button onclick="window.location.href='certification_portal.html'" style="flex:1;padding:12px;background:transparent;border:1px solid rgba(201,153,58,0.4);color:rgba(250,250,248,0.7);border-radius:4px;font-weight:500;font-size:0.88rem;cursor:pointer;">
            + Certify Another
          </button>
        </div>
      `;
      sessionStorage.removeItem('activeCert');
    }

    function showFailed(data) {
      document.getElementById('statusTitle').textContent = '❌ Certification Failed';
      document.getElementById('statusMsg').innerHTML   = (data.failure_reason || 'An error occurred during processing.') + '<br><br><a href="certification_portal.html" style="color:#C9993A;">Try again →</a>';
    }

    // ── Manual load mode (arrived directly to this page) ─────────────────────
    loadBtn && loadBtn.addEventListener('click', () => {
      const certId = certIdInput && certIdInput.value.trim();
      if (!certId && !selectedFile) {
        showError('Please enter a certificate ID or upload a certificate file');
        return;
      }
      if (certId && certId.length >= 10) {
        // Redirect with the cert id as param so polling mode activates
        window.location.href = `certificate_loader.html?cert=${encodeURIComponent(certId)}&id=${encodeURIComponent(certId)}`;
        return;
      }
      showError('Invalid certificate ID format (minimum 10 characters)');
    });

    cancelBtn && cancelBtn.addEventListener('click', () => { window.location.href = 'dashboard.html'; });

    uploadArea && uploadArea.addEventListener('click', () => { fileInput && fileInput.click(); });

    fileInput && fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 5*1024*1024) { showError('File size must be less than 5MB'); return; }
      selectedFile = file;
      if (fileNameSpan) fileNameSpan.textContent = file.name;
      if (fileInfo)    fileInfo.style.display = 'flex';
      if (uploadArea)  uploadArea.style.display = 'none';
    });

    removeFileBtn && removeFileBtn.addEventListener('click', () => {
      selectedFile = null;
      if (fileInput)   fileInput.value = '';
      if (fileInfo)    fileInfo.style.display = 'none';
      if (uploadArea)  uploadArea.style.display = 'block';
    });

    certIdInput && certIdInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && loadBtn) loadBtn.click();
    });
</script>
</body>
