<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Profile | SeekReap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0A0E;
            color: #FAFAF8;
            padding: 40px 24px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Profile Header */
        .profile-header {
            background: #111115;
            border: 1px solid rgba(201, 153, 58, 0.2);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 32px;
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #C9993A, #9B7520);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            color: #0A0A0E;
        }

        .info {
            flex: 1;
        }

        .name {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .artistic-name {
            color: #E8C06A;
            font-size: 18px;
            margin-bottom: 16px;
        }

        .email {
            color: rgba(250, 250, 248, 0.6);
            margin-bottom: 8px;
        }

        .joined {
            color: rgba(250, 250, 248, 0.4);
            font-size: 14px;
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #111115;
            border: 1px solid rgba(201, 153, 58, 0.15);
            border-radius: 16px;
            padding: 20px 32px;
            text-align: center;
            min-width: 120px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #C9993A;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(250, 250, 248, 0.5);
            margin-top: 4px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 24px;
        }

        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: rgba(250, 250, 248, 0.6);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab.active {
            color: #C9993A;
            border-bottom: 2px solid #C9993A;
        }

        /* Works Grid */
        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .work-card {
            background: #111115;
            border: 1px solid rgba(201, 153, 58, 0.15);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.2s;
        }

        .work-card:hover {
            border-color: rgba(201, 153, 58, 0.4);
            transform: translateY(-2px);
        }

        .work-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .work-type {
            display: inline-block;
            background: rgba(201, 153, 58, 0.1);
            color: #E8C06A;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        .work-hash {
            font-family: monospace;
            font-size: 10px;
            color: rgba(250, 250, 248, 0.4);
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 8px;
            border-radius: 6px;
            word-break: break-all;
            margin: 12px 0;
        }

        .work-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cert-status {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #3DB87A;
        }

        .match-badge {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 500;
        }

        .match-low {
            background: rgba(61, 184, 122, 0.15);
            color: #3DB87A;
        }

        .match-medium {
            background: rgba(232, 160, 48, 0.15);
            color: #E8A030;
        }

        .match-high {
            background: rgba(224, 85, 85, 0.15);
            color: #E05555;
        }

        /* Detection Table */
        .detections-table {
            width: 100%;
            border-collapse: collapse;
        }

        .detections-table th,
        .detections-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detections-table th {
            color: rgba(250, 250, 248, 0.5);
            font-weight: 500;
            font-size: 12px;
        }

        .platform-link {
            color: #E8C06A;
            text-decoration: none;
        }

        .platform-link:hover {
            text-decoration: underline;
        }

        /* Certificates Table */
        .certificates-table {
            width: 100%;
            border-collapse: collapse;
        }

        .certificates-table th,
        .certificates-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .certificates-table th {
            color: rgba(250, 250, 248, 0.5);
            font-weight: 500;
            font-size: 12px;
        }

        .verify-link {
            color: #C9993A;
            text-decoration: none;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: rgba(250, 250, 248, 0.4);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
        }

        /* Work Detail Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #111115;
            border: 1px solid rgba(201, 153, 58, 0.3);
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-close {
            float: right;
            background: none;
            border: none;
            color: rgba(250, 250, 248, 0.6);
            font-size: 24px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .stats {
                justify-content: center;
            }
            .works-grid {
                grid-template-columns: 1fr;
            }
            .detections-table,
            .certificates-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">Loading profile...</div>
    </div>

    <div id="workModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="/supabase-config.js"></script>
    <script>
        let currentUser = null;
        let submissions = [];

        async function init() {
            await waitForSupabase();
            await loadSession();
            if (currentUser) {
                await loadData();
                render();
            } else {
                document.getElementById('app').innerHTML = '<div class="empty-state">Please sign in to view your profile.</div>';
            }
        }

        function waitForSupabase() {
            return new Promise((resolve) => {
                if (window.supabaseClient) {
                    resolve();
                } else {
                    document.addEventListener('supabaseReady', resolve, { once: true });
                }
            });
        }

        async function loadSession() {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            currentUser = session?.user || null;
        }

        async function loadData() {
            const { data, error } = await window.supabaseClient
                .from('submissions')
                .select(`
                    *,
                    certificates(*),
                    content_matches(*)
                `)
                .eq('creator_id', currentUser.id)
                .order('created_at', { ascending: false });

            if (!error && data) {
                submissions = data;
            }
        }

        function render() {
            const app = document.getElementById('app');
            
            const metadata = currentUser.user_metadata || {};
            const fullName = metadata.full_name || currentUser.email?.split('@')[0] || 'Creator';
            const artisticName = metadata.artistic_name || '';
            
            const certifiedCount = submissions.filter(s => s.certificates && s.certificates.length > 0).length;
            const totalMatches = submissions.reduce((sum, s) => sum + (s.content_matches?.length || 0), 0);

            app.innerHTML = `
                <div class="profile-header">
                    <div class="avatar">${fullName.charAt(0).toUpperCase()}</div>
                    <div class="info">
                        <div class="name">${escapeHtml(fullName)}</div>
                        ${artisticName ? `<div class="artistic-name">${escapeHtml(artisticName)}</div>` : ''}
                        <div class="email">${escapeHtml(currentUser.email)}</div>
                        <div class="joined">Joined ${new Date(currentUser.created_at).toLocaleDateString()}</div>
                    </div>
                </div>

                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number">${submissions.length}</div>
                        <div class="stat-label">Works</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${certifiedCount}</div>
                        <div class="stat-label">Certified</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${totalMatches}</div>
                        <div class="stat-label">Detections</div>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab active" onclick="showTab('works')">📁 Works (${submissions.length})</button>
                    <button class="tab" onclick="showTab('detections')">🔍 Detections (${totalMatches})</button>
                    <button class="tab" onclick="showTab('certificates')">📜 Certificates (${certifiedCount})</button>
                </div>

                <div id="worksTab">${renderWorks()}</div>
                <div id="detectionsTab" style="display: none;">${renderDetections()}</div>
                <div id="certificatesTab" style="display: none;">${renderCertificates()}</div>
            `;
        }

        function renderWorks() {
            if (submissions.length === 0) {
                return '<div class="empty-state">No works submitted yet.</div>';
            }

            return `
                <div class="works-grid">
                    ${submissions.map(sub => {
                        const certificate = sub.certificates?.[0];
                        const matches = sub.content_matches || [];
                        const maxSimilarity = matches.length > 0 ? Math.max(...matches.map(m => m.similarity_score || 0)) : 0;
                        let matchClass = 'match-low';
                        if (maxSimilarity >= 80) matchClass = 'match-high';
                        else if (maxSimilarity >= 50) matchClass = 'match-medium';
                        
                        return `
                            <div class="work-card" onclick="showWorkDetail('${sub.id}')">
                                <div class="work-title">${escapeHtml(sub.title || 'Untitled')}</div>
                                <div class="work-type">${sub.work_type || 'Creative Work'}</div>
                                <div class="work-hash">${sub.content_hash ? sub.content_hash.substring(0, 32) + '...' : 'Hash pending'}</div>
                                <div class="work-footer">
                                    <div class="cert-status">
                                        ${certificate ? '✓ Certified' : '○ Pending'}
                                    </div>
                                    <div class="match-badge ${matchClass}">
                                        ${matches.length} match${matches.length !== 1 ? 'es' : ''}
                                        ${maxSimilarity > 0 ? ` · ${Math.round(maxSimilarity)}%` : ''}
                                    </div>
                                </div>
                                <div style="font-size: 11px; color: rgba(250,250,248,0.3); margin-top: 12px;">
                                    ${new Date(sub.created_at).toLocaleDateString()}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderDetections() {
            const allMatches = submissions.flatMap(sub => 
                (sub.content_matches || []).map(match => ({
                    ...match,
                    work_title: sub.title,
                    work_id: sub.id
                }))
            ).sort((a, b) => (b.similarity_score || 0) - (a.similarity_score || 0));

            if (allMatches.length === 0) {
                return '<div class="empty-state">No matches detected.</div>';
            }

            return `
                <table class="detections-table">
                    <thead>
                        <tr><th>Work</th><th>Platform</th><th>Similarity</th><th>Status</th><th>Detected</th></tr>
                    </thead>
                    <tbody>
                        ${allMatches.map(match => `
                            <tr>
                                <td>${escapeHtml(match.work_title || 'Untitled')}</td>
                                <td>${match.platform ? `<a href="${match.platform_url || '#'}" target="_blank" class="platform-link">${escapeHtml(match.platform)}</a>` : '-'}</td>
                                <td style="color: ${match.similarity_score >= 80 ? '#E05555' : match.similarity_score >= 50 ? '#E8A030' : '#3DB87A'}">${Math.round(match.similarity_score || 0)}%</td>
                                <td>${match.status || 'detected'}</td>
                                <td style="font-size: 12px;">${new Date(match.detected_at).toLocaleDateString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderCertificates() {
            const certified = submissions.filter(s => s.certificates && s.certificates.length > 0);

            if (certified.length === 0) {
                return '<div class="empty-state">No certificates issued yet.</div>';
            }

            return `
                <table class="certificates-table">
                    <thead>
                        <tr><th>Work</th><th>Certificate ID</th><th>Blockchain</th><th>Issued</th><th>Verify</th></tr>
                    </thead>
                    <tbody>
                        ${certified.map(sub => {
                            const cert = sub.certificates[0];
                            return `
                                <tr>
                                    <td>${escapeHtml(sub.title || 'Untitled')}</td>
                                    <td style="font-family: monospace; font-size: 12px;">${cert.cert_id}</td>
                                    <td>${cert.blockchain_tx_hash ? 'Verified' : 'Pending'}</td>
                                    <td style="font-size: 12px;">${new Date(cert.created_at).toLocaleDateString()}</td>
                                    <td><a href="/certificate_verify.html?id=${cert.cert_id}" target="_blank" class="verify-link">Verify →</a></td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        function showWorkDetail(workId) {
            const work = submissions.find(s => s.id === workId);
            if (!work) return;

            const certificate = work.certificates?.[0];
            const modal = document.getElementById('workModal');
            const modalBody = document.getElementById('modalBody');

            modalBody.innerHTML = `
                <h3 style="margin-bottom: 16px;">${escapeHtml(work.title || 'Untitled')}</h3>
                <p style="margin-bottom: 8px;"><strong>Type:</strong> ${work.work_type || 'Not specified'}</p>
                <p style="margin-bottom: 8px;"><strong>File Hash:</strong> <span style="font-family: monospace; font-size: 12px;">${work.content_hash || 'Not available'}</span></p>
                <p style="margin-bottom: 8px;"><strong>Created:</strong> ${new Date(work.created_at).toLocaleString()}</p>
                <p style="margin-bottom: 16px;"><strong>Certificate:</strong> ${certificate ? certificate.cert_id : 'Not certified'}</p>
                ${certificate && certificate.blockchain_tx_hash ? `<p><strong>Blockchain TX:</strong> <span style="font-family: monospace; font-size: 12px;">${certificate.blockchain_tx_hash}</span></p>` : ''}
                <button onclick="closeModal()" style="margin-top: 20px; padding: 8px 24px; background: #C9993A; border: none; border-radius: 8px; color: #0A0A0E; cursor: pointer;">Close</button>
            `;

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('workModal').style.display = 'none';
        }

        window.showTab = function(tab) {
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('worksTab').style.display = tab === 'works' ? 'block' : 'none';
            document.getElementById('detectionsTab').style.display = tab === 'detections' ? 'block' : 'none';
            document.getElementById('certificatesTab').style.display = tab === 'certificates' ? 'block' : 'none';
        };

        window.showWorkDetail = showWorkDetail;
        window.closeModal = closeModal;

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        init();
    </script>
</body>
</html>
