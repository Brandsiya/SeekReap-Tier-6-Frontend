<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Profile | SeekReap</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #C9993A;
            --gold-light: #E8C06A;
            --gold-dark: #9B7520;
            --black: #0A0A0E;
            --black-2: #111115;
            --black-3: #15151C;
            --white: #FAFAF8;
            --white-dim: rgba(250,250,248,0.65);
            --white-muted: rgba(250,250,248,0.35);
            --red: #E05555;
            --green: #3DB87A;
            --blue: #3B82F6;
            --orange: #E8A030;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(circle at 10% 20%, var(--black), #000000);
            color: var(--white);
            min-height: 100vh;
        }

        /* Navigation */
        .navbar {
            background: rgba(10, 10, 14, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(201, 153, 58, 0.2);
            padding: 16px 32px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--white), var(--gold-light));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            color: var(--white-dim);
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--gold); }

        .signout-btn {
            background: transparent;
            border: 1px solid var(--gold-border);
            color: var(--white-dim);
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .signout-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* Profile Header */
        .profile-header {
            background: linear-gradient(145deg, var(--black-2), var(--black-3));
            border: 1px solid rgba(201, 153, 58, 0.2);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            align-items: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            color: var(--black);
            box-shadow: 0 10px 30px rgba(201, 153, 58, 0.3);
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .profile-artistic {
            color: var(--gold-light);
            font-size: 1.2rem;
            margin-bottom: 16px;
        }

        .profile-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-top: 16px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--white-dim);
            font-size: 0.9rem;
        }

        .meta-item i { color: var(--gold); width: 20px; }

        .stats {
            display: flex;
            gap: 32px;
            text-align: center;
        }

        .stat {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 16px 24px;
            min-width: 100px;
        }

        .stat-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--white-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--black-2);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 32px;
        }

        .tab {
            flex: 1;
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: var(--white-dim);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .tab.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .work-card {
            background: linear-gradient(145deg, var(--black-2), var(--black-3));
            border: 1px solid rgba(201, 153, 58, 0.15);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .work-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .work-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .work-type {
            display: inline-block;
            font-size: 0.75rem;
            color: var(--gold-light);
            background: rgba(201,153,58,0.1);
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        .work-hash {
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--white-muted);
            word-break: break-all;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 8px;
            margin: 12px 0;
        }

        .work-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .cert-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            color: var(--green);
        }

        .risk-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .risk-low { background: rgba(61,184,122,0.15); color: var(--green); }
        .risk-medium { background: rgba(232,160,48,0.15); color: var(--orange); }
        .risk-high { background: rgba(224,85,85,0.15); color: var(--red); }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--white-dim);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(201,153,58,0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 768px) {
            .profile-header { flex-direction: column; text-align: center; }
            .stats { justify-content: center; }
            .profile-meta { justify-content: center; }
            .navbar { padding: 12px 20px; }
            .nav-links { gap: 12px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="/certification_portal.html" class="logo">
            <svg width="28" height="28" viewBox="0 0 100 100" fill="none">
                <text x="18" y="68" font-family="Cormorant Garamond, serif" font-size="56" font-weight="700" fill="#E8C06A">S</text>
                <text x="52" y="68" font-family="Cormorant Garamond, serif" font-size="56" font-weight="700" fill="#C9993A">R</text>
            </svg>
            SeekReap
        </a>
        <div class="nav-links">
            <a href="/certification_portal.html">Dashboard</a>
            <a href="/creator_profile.html" class="active">Profile</a>
            <button class="signout-btn" onclick="signOut()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
        </div>
    </div>
</nav>

<div class="container">
    <div id="profile-content">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading profile...</p>
        </div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/supabase-config.js"></script>
<script src="/assets/js/cert-api-auth-injector.js"></script>
<script>
    let currentUser = null;
    let works = [];

    // Helper functions
    function getClient() {
        if (window.supabaseClient) return Promise.resolve(window.supabaseClient);
        return new Promise((resolve, reject) => {
            const timeout = setTimeout(() => reject(new Error('Auth unavailable')), 10000);
            document.addEventListener('supabaseReady', () => {
                clearTimeout(timeout);
                resolve(window.supabaseClient);
            }, { once: true });
        });
    }

    async function getCurrentUser() {
        try {
            const sb = await getClient();
            const { data: { session } } = await sb.auth.getSession();
            if (session?.user) {
                currentUser = session.user;
                return currentUser;
            }
            return null;
        } catch (err) {
            console.error('Auth error:', err);
            return null;
        }
    }

    async function signOut() {
        try {
            const sb = await getClient();
            await sb.auth.signOut();
            window.location.href = '/signup_signin.html';
        } catch (err) {
            console.error('Sign out error:', err);
        }
    }

    async function loadCreatorProfile() {
        const user = await getCurrentUser();
        if (!user) {
            window.location.href = '/signup_signin.html?redirect=/creator_profile.html';
            return;
        }

        await loadWorks(user.id);
        renderProfile(user);
    }

    async function loadWorks(creatorId) {
        try {
            const sb = await getClient();
            
            // Fetch all submissions by this creator
            const { data: submissions, error } = await sb
                .from('submissions')
                .select(`
                    id,
                    title,
                    work_type,
                    content_hash,
                    file_size,
                    created_at,
                    certificates (
                        cert_id,
                        blockchain_tx_hash,
                        status
                    ),
                    content_matches (
                        id,
                        similarity_score,
                        platform,
                        platform_url,
                        status
                    )
                `)
                .eq('creator_id', creatorId)
                .order('created_at', { ascending: false });

            if (error) throw error;
            works = submissions || [];
            renderWorks();

        } catch (err) {
            console.error('Error loading works:', err);
            document.getElementById('works-grid').innerHTML = 
                '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Error loading your works. Please try again.</p></div>';
        }
    }

    function getRiskLevel(matches) {
        if (!matches || matches.length === 0) return { level: 'low', score: 0 };
        const maxSimilarity = Math.max(...matches.map(m => m.similarity_score || 0));
        if (maxSimilarity >= 80) return { level: 'high', score: maxSimilarity };
        if (maxSimilarity >= 50) return { level: 'medium', score: maxSimilarity };
        return { level: 'low', score: maxSimilarity };
    }

    function renderWorks() {
        const container = document.getElementById('works-grid');
        if (!works.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-music"></i>
                    <p>No works certified yet.</p>
                    <a href="/certification_portal.html" style="color: var(--gold);">Start your first certification →</a>
                </div>
            `;
            return;
        }

        container.innerHTML = works.map(work => {
            const certificate = work.certificates?.[0];
            const matches = work.content_matches || [];
            const risk = getRiskLevel(matches);
            
            return `
                <div class="work-card" onclick="viewWork('${work.id}')">
                    <div class="work-type">${work.work_type || 'Creative Work'}</div>
                    <div class="work-title">${escapeHtml(work.title || 'Untitled')}</div>
                    <div class="work-hash" title="${work.content_hash || 'No hash'}">
                        ${work.content_hash ? work.content_hash.substring(0, 32) + '...' : 'Hash pending'}
                    </div>
                    <div class="work-footer">
                        <div class="cert-badge">
                            <i class="fas fa-certificate"></i>
                            ${certificate ? certificate.cert_id || 'Certified' : 'Pending'}
                        </div>
                        <div class="risk-badge risk-${risk.level}">
                            ${matches.length} match${matches.length !== 1 ? 'es' : ''}
                            ${risk.score > 0 ? ` · ${Math.round(risk.score)}%` : ''}
                        </div>
                    </div>
                    <div style="font-size: 0.7rem; color: var(--white-muted); margin-top: 12px;">
                        <i class="far fa-calendar-alt"></i> ${new Date(work.created_at).toLocaleDateString()}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderProfile(user) {
        const metadata = user.user_metadata || {};
        const fullName = metadata.full_name || user.email?.split('@')[0] || 'Creator';
        const artisticName = metadata.artistic_name || '';
        
        // Calculate stats
        const certifiedCount = works.filter(w => w.certificates?.length > 0).length;
        const totalMatches = works.reduce((sum, w) => sum + (w.content_matches?.length || 0), 0);
        const highRiskCount = works.filter(w => getRiskLevel(w.content_matches).level === 'high').length;

        const profileHtml = `
            <div class="profile-header">
                <div class="avatar">${fullName.charAt(0).toUpperCase()}</div>
                <div class="profile-info">
                    <h1 class="profile-name">${escapeHtml(fullName)}</h1>
                    ${artisticName ? `<div class="profile-artistic">aka ${escapeHtml(artisticName)}</div>` : ''}
                    <div class="profile-meta">
                        <div class="meta-item"><i class="fas fa-envelope"></i> ${escapeHtml(user.email)}</div>
                        <div class="meta-item"><i class="fas fa-calendar-alt"></i> Joined ${new Date(user.created_at).toLocaleDateString()}</div>
                    </div>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-number">${works.length}</div>
                        <div class="stat-label">Works</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number">${certifiedCount}</div>
                        <div class="stat-label">Certified</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number">${totalMatches}</div>
                        <div class="stat-label">Detections</div>
                    </div>
                    ${highRiskCount > 0 ? `
                    <div class="stat">
                        <div class="stat-number" style="color: var(--red);">${highRiskCount}</div>
                        <div class="stat-label">High Risk</div>
                    </div>
                    ` : ''}
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('works')">📁 My Works</button>
                <button class="tab" onclick="switchTab('detections')">🔍 Detections (${totalMatches})</button>
                <button class="tab" onclick="switchTab('certificates')">📜 Certificates (${certifiedCount})</button>
            </div>

            <div id="works-tab" class="tab-content">
                <div id="works-grid" class="cards-grid"></div>
            </div>

            <div id="detections-tab" class="tab-content" style="display: none;">
                <div id="detections-grid" class="cards-grid"></div>
            </div>

            <div id="certificates-tab" class="tab-content" style="display: none;">
                <div id="certificates-grid" class="cards-grid"></div>
            </div>
        `;
        
        document.getElementById('profile-content').innerHTML = profileHtml;
        renderWorks();
        renderDetections();
        renderCertificates();
    }

    function renderDetections() {
        const container = document.getElementById('detections-grid');
        const allMatches = works.flatMap(work => 
            (work.content_matches || []).map(match => ({ ...match, work_title: work.title, work_id: work.id }))
        ).sort((a, b) => (b.similarity_score || 0) - (a.similarity_score || 0));

        if (!allMatches.length) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-shield-alt"></i><p>No matches detected. Your work is unique!</p></div>';
            return;
        }

        container.innerHTML = allMatches.map(match => `
            <div class="work-card" onclick="window.open('${match.platform_url || '#'}', '_blank')">
                <div class="work-type">${match.platform || 'Unknown Platform'}</div>
                <div class="work-title">${escapeHtml(match.work_title || 'Unknown Work')}</div>
                <div class="work-footer">
                    <div class="risk-badge risk-${match.similarity_score >= 80 ? 'high' : match.similarity_score >= 50 ? 'medium' : 'low'}">
                        ${Math.round(match.similarity_score || 0)}% Similar
                    </div>
                    <div class="cert-badge">
                        <i class="fas fa-external-link-alt"></i> View
                    </div>
                </div>
                <div style="font-size: 0.7rem; color: var(--white-muted); margin-top: 12px;">
                    <i class="far fa-clock"></i> ${new Date(match.detected_at).toLocaleDateString()}
                </div>
            </div>
        `).join('');
    }

    function renderCertificates() {
        const container = document.getElementById('certificates-grid');
        const certifiedWorks = works.filter(w => w.certificates?.length > 0);

        if (!certifiedWorks.length) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-certificate"></i><p>No certificates issued yet.</p><a href="/certification_portal.html" style="color: var(--gold);">Get certified →</a></div>';
            return;
        }

        container.innerHTML = certifiedWorks.map(work => {
            const cert = work.certificates[0];
            return `
                <div class="work-card" onclick="viewCertificate('${cert.cert_id}')">
                    <div class="work-type">Certificate</div>
                    <div class="work-title">${escapeHtml(work.title || 'Untitled')}</div>
                    <div class="work-hash">ID: ${cert.cert_id}</div>
                    <div class="work-footer">
                        <div class="cert-badge">
                            <i class="fas fa-check-circle"></i> Blockchain Verified
                        </div>
                        <div class="risk-badge risk-low">
                            <i class="fas fa-qrcode"></i> Verify
                        </div>
                    </div>
                    <div style="font-size: 0.7rem; color: var(--white-muted); margin-top: 12px;">
                        <i class="fas fa-link"></i> ${cert.blockchain_tx_hash ? cert.blockchain_tx_hash.substring(0, 16) + '...' : 'Pending'}
                    </div>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function viewWork(workId) {
        window.location.href = `/work_detail.html?id=${workId}`;
    }

    function viewCertificate(certId) {
        window.open(`/certificate_verify.html?id=${certId}`, '_blank');
    }

    window.switchTab = function(tab) {
        const tabs = ['works', 'detections', 'certificates'];
        tabs.forEach(t => {
            const el = document.getElementById(`${t}-tab`);
            const btn = document.querySelector(`.tab:contains(${t === 'works' ? 'My Works' : t === 'detections' ? 'Detections' : 'Certificates'})`);
            if (el) el.style.display = 'none';
        });
        document.getElementById(`${tab}-tab`).style.display = 'block';
        
        // Update active tab styling
        document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    };

    // Initialize
    document.addEventListener('DOMContentLoaded', loadCreatorProfile);
</script>
</body>
</html>
