<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeekReap - Sign In & Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/signup_signin.css">
</head>
<body>
    <!-- Floating particles -->
    <div class="particle" style="width: 2px; height: 2px; left: 10%; animation-duration: 15s;"></div>
    <div class="particle" style="width: 3px; height: 3px; left: 20%; animation-duration: 25s; animation-delay: -5s;"></div>
    <div class="particle" style="width: 1px; height: 1px; left: 30%; animation-duration: 18s;"></div>
    <div class="particle" style="width: 2px; height: 2px; left: 45%; animation-duration: 22s; animation-delay: -2s;"></div>
    <div class="particle" style="width: 2px; height: 2px; left: 60%; animation-duration: 20s;"></div>
    <div class="particle" style="width: 1px; height: 1px; left: 75%; animation-duration: 28s; animation-delay: -7s;"></div>
    <div class="particle" style="width: 3px; height: 3px; left: 85%; animation-duration: 24s;"></div>

    <div class="auth-container">
        <div class="brand-logo">
            <!-- Replaced shield with SeekReap SR logo -->
            <svg class="logo" viewBox="0 0 200 200" fill="none">
                <defs>
                    <linearGradient id="logoGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#FAFAF8"/>
                        <stop offset="70%" stop-color="#E8C06A"/>
                        <stop offset="100%" stop-color="#C9993A"/>
                    </linearGradient>
                    <linearGradient id="logoGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#C9993A"/>
                        <stop offset="100%" stop-color="#9B7520"/>
                    </linearGradient>
                </defs>
                <g stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M100 50 L100 60 M97 55 L103 65 M93 60 L107 72 M88 75 L112 85 M85 90 L115 92" stroke="url(#logoGrad2)" opacity="0.9"/>
                    <path d="M85 105 L115 105 M88 115 L112 115 M93 125 L107 125 M97 135 L103 135 M100 140 L100 150" stroke="url(#logoGrad2)"/>
                    <circle cx="100" cy="100" r="3" fill="url(#logoGrad1)" opacity="0.8"/>
                </g>
                <text x="65" y="175" font-size="80" font-weight="700" fill="url(#logoGrad1)" opacity="0.95">S</text>
                <text x="115" y="175" font-size="80" font-weight="700" fill="url(#logoGrad2)">R</text>
            </svg>
            <span>Seek<span style="color: var(--accent);">Reap</span></span>
        </div>

        <div class="tabs">
            <div class="tab active" id="signin-tab" onclick="switchTab('signin')">Sign In</div>
            <div class="tab" id="signup-tab" onclick="switchTab('signup')">Sign Up</div>
        </div>

        <div class="forms-container">
            <div id="message-container"></div>

            <!-- Sign In Form -->
            <div id="signin-form" class="auth-form">
                <h2 class="form-title">Log Into Your Account</h2>

                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signin-email" placeholder="creator@seekreap.io" autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('signin-password', this)"></i>
                    </div>
                </div>

                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember-me">
                        <span>Remember me</span>
                    </label>
                    <a href="reset_password.html" class="forgot-link">Forgot password?</a>
                </div>

                <button class="auth-btn" onclick="window.location.href='dashboard.html';">
                    <i class="fas fa-arrow-right"></i> Sign In
                </button>

                <div class="terms">
                    Don't have an account? <a href="#" onclick="switchTab('signup'); return false;">Sign up</a>
                </div>
            </div>

            <!-- Sign Up Form -->
            <div id="signup-form" class="auth-form hidden">
                <h2 class="form-title">Create Your Account</h2>

                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signup-name" placeholder="Alex Creator" autocomplete="name">
                    </div>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signup-email" placeholder="creator@seekreap.io" autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signup-password" placeholder="••••••••" autocomplete="new-password">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('signup-password', this)"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signup-confirm-password" placeholder="••••••••" autocomplete="new-password">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('signup-confirm-password', this)"></i>
                    </div>
                </div>

                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="accept-terms">
                        <span>I agree to the <a href="Terms.html" style="color: var(--accent);">Terms of Service</a> & <a href="Privacy_Policy.html" style="color: var(--accent);">Privacy Policy</a></span>
                    </label>
                </div>

                <button class="auth-btn" onclick="window.location.href='certification_portal.html';">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>

                <div class="terms">
                    Already have an account? <a href="#" onclick="switchTab('signin'); return false;">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="/supabase-config.js"></script>
    <script src="/assets/js/signup_signin.js"></script>
</body>
</html>
