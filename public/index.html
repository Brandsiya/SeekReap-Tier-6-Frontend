<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SeekReap is loading your content protection dashboard">
    <title>SeekReap - Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Floating particles (optional, matches home page aesthetic) -->
    <div class="particle" style="width: 2px; height: 2px; left: 10%; animation-duration: 15s;"></div>
    <div class="particle" style="width: 3px; height: 3px; left: 20%; animation-duration: 25s; animation-delay: -5s;"></div>
    <div class="particle" style="width: 1px; height: 1px; left: 30%; animation-duration: 18s;"></div>
    <div class="particle" style="width: 2px; height: 2px; left: 45%; animation-duration: 22s; animation-delay: -2s;"></div>
    <div class="particle" style="width: 2px; height: 2px; left: 60%; animation-duration: 20s;"></div>
    <div class="particle" style="width: 1px; height: 1px; left: 75%; animation-duration: 28s; animation-delay: -7s;"></div>
    <div class="particle" style="width: 3px; height: 3px; left: 85%; animation-duration: 24s;"></div>
    <div class="particle" style="width: 2px; height: 2px; left: 95%; animation-duration: 30s; animation-delay: -3s;"></div>

    <div class="loader-container">
        <div class="logo">Seek<span style="color: var(--accent);">Reap</span></div>
        
        <div class="scanner">
            <div class="ring"></div>
            <div class="ring2"></div>
            <div class="core"></div>
        </div>
        
        <div id="status">Initializing protection engine...</div>
        
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
        
        <div class="note">Fingerprinting your content • AI analysis ready</div>
    </div>
      <script src="/assets/js/index.js"></script>
    </body>
</html>
