<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Loading SeekReap...</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9993A;
      --gold-light: #E8C06A;
      --gold-dark: #9B7520;
      --black: #08080A;
      --black-2: #111115;
      --white: #FAFAF8;
      --glow: rgba(201,153,58,0.4);
      --border: rgba(201,153,58,0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Cormorant Garamond', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding: 0 20px;
    }

    /* Subtle background glow */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 50% 50%, rgba(201,153,58,0.06) 0%, transparent 50%);
      z-index: 1;
    }

    /* Main container - perfectly centered */
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      z-index: 10;
      position: relative;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    /* Logo - Static, centered, no movement */
    .logo {
      width: clamp(100px, 22vw, 140px);
      height: clamp(100px, 22vw, 140px);
      filter: drop-shadow(0 0 20px var(--glow));
    }

    /* Custom SeekReap Loader - Centered */
    .sr-loader {
      position: relative;
      width: clamp(64px, 16vw, 96px);
      height: clamp(64px, 16vw, 96px);
      margin: 0 auto;
    }

    /* Outer ring */
    .loader-ring {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-top: 3px solid var(--gold-light);
      border-right: 3px solid var(--gold);
      border-radius: 50%;
      animation: srSpin 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    /* Inner pulsing ring */
    .loader-inner {
      position: absolute;
      top: 20%;
      left: 20%;
      width: 60%;
      height: 60%;
      border: 2px solid transparent;
      border-top: 2px solid var(--gold);
      border-radius: 50%;
      animation: srPulse 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    /* SR letters */
    .sr-letters {
      position: absolute;
      top: 28%;
      left: 28%;
      width: 44%;
      height: 44%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 700;
      color: var(--gold-light);
      text-shadow: 0 0 12px var(--glow);
      animation: srGlow 1.4s ease-in-out infinite alternate;
    }

    @keyframes srSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes srPulse {
      0%, 100% { transform: scale(0.85) rotate(0deg); opacity: 0.7; }
      50% { transform: scale(1.15) rotate(180deg); opacity: 1; }
    }

    @keyframes srGlow {
      from { text-shadow: 0 0 12px var(--glow); }
      to { text-shadow: 0 0 20px var(--gold), 0 0 30px var(--gold); }
    }

    /* Progress bar - Always at bottom of container */
    .progress-section {
      width: 100%;
      max-width: 280px;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--border);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
      width: 0%;
      border-radius: 1px;
      animation: progressFill 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      position: relative;
      box-shadow: 0 0 12px var(--glow);
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 20px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6));
      animation: progressShine 1.8s infinite;
    }

    @keyframes progressFill {
      0% { width: 0%; }
      50% { width: 65%; }
      100% { width: 100%; }
    }

    @keyframes progressShine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Perfect centering for all screen sizes */
    @media (max-width: 480px) {
      body { padding: 0 16px; }
      .loader-container { gap: 36px; }
    }

    @media (max-height: 600px) {
      .loader-container { gap: 32px; }
      .logo { margin-bottom: 0; }
    }

    /* Fade out before redirect */
    .fade-out {
      animation: fadeOut 0.4s ease-out forwards;
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.98); }
    }
  </style>
</head>
<body>
  <div class="loader-container">
    <!-- Logo - Static position -->
    <svg class="logo" viewBox="0 0 200 200" fill="none">
      <defs>
        <linearGradient id="logoGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FAFAF8"/>
          <stop offset="70%" stop-color="#E8C06A"/>
          <stop offset="100%" stop-color="#C9993A"/>
        </linearGradient>
        <linearGradient id="logoGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#C9993A"/>
          <stop offset="100%" stop-color="#9B7520"/>
        </linearGradient>
      </defs>
      <g stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M100 50 L100 60 M97 55 L103 65 M93 60 L107 72 M88 75 L112 85 M85 90 L115 92" stroke="url(#logoGrad2)" opacity="0.9"/>
        <path d="M85 105 L115 105 M88 115 L112 115 M93 125 L107 125 M97 135 L103 135 M100 140 L100 150" stroke="url(#logoGrad2)"/>
        <circle cx="100" cy="100" r="3" fill="url(#logoGrad1)" opacity="0.8"/>
      </g>
      <text x="65" y="175" font-size="80" font-weight="700" fill="url(#logoGrad1)" opacity="0.95">S</text>
      <text x="115" y="175" font-size="80" font-weight="700" fill="url(#logoGrad2)">R</text>
    </svg>

    <!-- SeekReap Loader -->
    <div class="sr-loader">
      <div class="loader-ring"></div>
      <div class="loader-inner"></div>
      <div class="sr-letters">SR</div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-section">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>
  </div>

  <script>
    // Auto-redirect after exactly 3 seconds
    setTimeout(() => {
      document.body.classList.add('fade-out');
      setTimeout(() => {
        window.location.href = 'home.html';
      }, 600);
    }, 5000);
  </script>
</body>
</html>
