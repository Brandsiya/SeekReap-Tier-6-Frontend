<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeekReap - Job Details</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">SeekReap</a>
            <div class="nav-links">
                <a href="/" class="nav-link">Upload</a>
                <a href="/dashboard.html" class="nav-link">Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="results-card">
            <h1>Verification Results</h1>
            <div id="jobDetails" class="job-details">Loading...</div>
            <div id="progress" class="progress-container" style="display: none;">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div id="resultData" class="result-data"></div>
            <button onclick="window.location.href='/'" class="submit-btn" style="margin-top: 1rem;">
                Upload Another Video
            </button>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');
        
        if (!jobId) {
            window.location.href = '/';
        }

        let pollInterval = null;

        async function fetchJob() {
            try {
                const response = await fetch(`${CONFIG.API_BASE}/api/submissions/${jobId}`);
                const job = await response.json();

                if (!response.ok) {
                    throw new Error(job.error || 'Failed to fetch job');
                }

                updateDisplay(job);

                if (job.status === 'completed' || job.status === 'failed') {
                    stopPolling();
                }

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('jobDetails').innerHTML = 
                    `<div class="error">Error loading job: ${error.message}</div>`;
                stopPolling();
            }
        }

        function updateDisplay(job) {
            const jobDetails = document.getElementById('jobDetails');
            const progressContainer = document.getElementById('progress');
            const progressBar = document.getElementById('progressBar');
            const resultData = document.getElementById('resultData');

            jobDetails.innerHTML = `
                <p><strong>Job ID:</strong> ${job.job_id}</p>
                <p><strong>Status:</strong> ${job.status}</p>
                <p><strong>Type:</strong> ${job.job_type}</p>
                <p><strong>Created:</strong> ${new Date(job.created_at).toLocaleString()}</p>
                ${job.completed_at ? `<p><strong>Completed:</strong> ${new Date(job.completed_at).toLocaleString()}</p>` : ''}
                ${job.failure_reason ? `<p><strong>Failure:</strong> ${job.failure_reason}</p>` : ''}
            `;

            if (job.status === 'pending') {
                progressContainer.style.display = 'block';
                let progress = 0;
                const interval = setInterval(() => {
                    progress = Math.min(progress + 5, 90);
                    progressBar.style.width = `${progress}%`;
                    if (progress >= 90) clearInterval(interval);
                }, 500);
            } else {
                progressContainer.style.display = 'none';
            }

            if (job.status === 'completed') {
                resultData.textContent = JSON.stringify(job.params || job.result || {}, null, 2);
            } else if (job.status === 'failed') {
                resultData.textContent = `Job failed: ${job.failure_reason}`;
            }
        }

        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        // Start polling
        pollInterval = setInterval(fetchJob, CONFIG.POLL_INTERVAL);
        fetchJob(); // Immediate first fetch

        window.addEventListener('beforeunload', stopPolling);
    </script>
</body>
</html>
