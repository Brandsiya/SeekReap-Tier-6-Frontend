<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h2>Test Tier-3 API Directly</h2>
    <button onclick="testTier3()">Test Tier-3 Jobs API</button>
    <button onclick="testTier4()">Test Tier-4 Submissions API</button>
    <pre id="result"></pre>

    <script>
        async function testTier3() {
            const result = document.getElementById('result');
            result.textContent = 'Testing Tier-3...';
            try {
                const res = await fetch('https://seekreap-tier-3-private.onrender.com/api/jobs');
                const data = await res.json();
                result.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                result.textContent = 'Error: ' + e.message;
            }
        }

        async function testTier4() {
            const result = document.getElementById('result');
            result.textContent = 'Testing Tier-4...';
            try {
                const res = await fetch('https://seekreap-tier-4-orchestrator-nrn4.onrender.com/api/submissions');
                const data = await res.json();
                result.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                result.textContent = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
