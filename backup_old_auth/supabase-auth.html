<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeekReap - Sign In with Supabase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #C9993A;
            --gold-light: #E8C06A;
            --black: #08080A;
            --black-2: #111115;
            --black-3: #18181E;
            --white: #FAFAF8;
            --white-dim: rgba(250,250,248,0.65);
            --border: rgba(201,153,58,0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(201,153,58,0.08) 0%, transparent 60%), var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-container {
            max-width: 480px;
            width: 100%;
            background: var(--black-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 40px 36px;
            position: relative;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .brand-logo {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 32px;
        }
        .brand-logo i {
            font-size: 40px;
            color: var(--gold);
            margin-right: 8px;
        }
        .brand-logo span {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--white), var(--gold-light));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .tabs {
            display: flex;
            gap: 8px;
            background: var(--black-3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px;
            margin-bottom: 32px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: 600;
            color: var(--white-dim);
            transition: all 0.3s;
            border-radius: 4px;
        }
        .tab.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--black);
        }
        .auth-form {
            transition: all 0.3s;
        }
        .auth-form.hidden {
            display: none;
        }
        .form-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: var(--white-dim);
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
        }
        .input-wrapper input {
            width: 100%;
            padding: 12px 40px;
            background: var(--black-3);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            color: var(--white);
            outline: none;
        }
        .input-wrapper input:focus {
            border-color: var(--gold);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            border-radius: 6px;
            font-weight: 700;
            color: var(--black);
            cursor: pointer;
            margin-bottom: 20px;
        }
        .social-btn {
            width: 100%;
            padding: 12px;
            background: var(--black-3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--white-dim);
            cursor: pointer;
            margin-bottom: 12px;
        }
        .social-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success {
            background: rgba(61,184,122,0.1);
            border: 1px solid rgba(61,184,122,0.3);
            color: #3DB87A;
            display: block;
        }
        .message.error {
            background: rgba(224,85,85,0.1);
            border: 1px solid rgba(224,85,85,0.3);
            color: #E05555;
            display: block;
        }
        .terms {
            text-align: center;
            font-size: 0.8rem;
            color: var(--white-dim);
            margin-top: 20px;
        }
        .terms a {
            color: var(--gold);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="brand-logo">
            <i class="fas fa-shield-alt"></i>
            <span>Seek<span style="color: var(--gold);">Reap</span></span>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('signin')">Sign In</div>
            <div class="tab" onclick="switchTab('signup')">Sign Up</div>
        </div>

        <div id="message" class="message"></div>

        <!-- Sign In Form -->
        <div id="signin-form" class="auth-form">
            <h2 class="form-title">Welcome Back</h2>
            <div class="input-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="signin-email" placeholder="creator@seekreap.io">
                </div>
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signin-password" placeholder="••••••••">
                </div>
            </div>
            <button class="auth-btn" onclick="handleSignIn()">
                <i class="fas fa-arrow-right"></i> Sign In
            </button>
            <button class="social-btn" onclick="handleGoogleSignIn()">
                <i class="fab fa-google"></i> Continue with Google
            </button>
        </div>

        <!-- Sign Up Form -->
        <div id="signup-form" class="auth-form hidden">
            <h2 class="form-title">Create Account</h2>
            <div class="input-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="signup-name" placeholder="Alex Creator">
                </div>
            </div>
            <div class="input-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="signup-email" placeholder="creator@seekreap.io">
                </div>
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signup-password" placeholder="••••••••">
                </div>
            </div>
            <button class="auth-btn" onclick="handleSignUp()">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
            <button class="social-btn" onclick="handleGoogleSignIn()">
                <i class="fab fa-google"></i> Sign up with Google
            </button>
        </div>

        <div class="terms">
            By continuing, you agree to SeekReap's <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="/supabase-client.js"></script>
    <script>
        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = `message ${type}`;
            setTimeout(() => {
                el.style.display = 'none';
                el.className = 'message';
            }, 5000);
        }

        function switchTab(tab) {
            const isSignin = tab === 'signin';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`${tab}-tab`).classList.add('active');
            document.getElementById('signin-form').classList.toggle('hidden', !isSignin);
            document.getElementById('signup-form').classList.toggle('hidden', isSignin);
        }

        async function handleSignIn() {
            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email, password
            });
            
            if (error) {
                showMessage(error.message, 'error');
            } else {
                showMessage('✅ Signed in successfully! Redirecting...', 'success');
                sessionStorage.setItem('supabase_user', JSON.stringify(data.user));
                setTimeout(() => {
                    window.location.href = 'certification_portal.html';
                }, 1500);
            }
        }

        async function handleSignUp() {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const name = document.getElementById('signup-name').value;
            
            const { data, error } = await supabase.auth.signUp({
                email, password,
                options: { data: { full_name: name } }
            });
            
            if (error) {
                showMessage(error.message, 'error');
            } else {
                showMessage('✅ Account created! Please check your email for confirmation.', 'success');
            }
        }

        async function handleGoogleSignIn() {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'google'
            });
            
            if (error) {
                showMessage(error.message, 'error');
            }
        }

        // Check if already logged in
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = 'certification_portal.html';
            }
        });
    </script>
</body>
</html>
