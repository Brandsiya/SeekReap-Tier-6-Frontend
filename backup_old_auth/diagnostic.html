<!DOCTYPE html>
<html>
<head>
    <title>SeekReap Diagnostic</title>
    <style>
        body { font-family: monospace; background: #08080A; color: #FAFAF8; padding: 20px; }
        .pass { color: #3DB87A; }
        .fail { color: #E05555; }
        pre { background: #111115; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔧 SeekReap Diagnostic Tool</h1>
    <div id="results"></div>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="/config.js"></script>
    <script>
        const results = document.getElementById('results');
        
        function log(msg, isError = false) {
            const div = document.createElement('div');
            div.innerHTML = msg;
            div.style.color = isError ? '#E05555' : '#3DB87A';
            results.appendChild(div);
        }
        
        setTimeout(() => {
            log('<strong>=== Firebase Status ===</strong>');
            log(`Firebase apps: ${firebase.apps.length} ${firebase.apps.length > 0 ? '✅' : '❌'}`);
            log(`API_CONFIG: ${window.API_CONFIG ? '✅ Loaded' : '❌ MISSING'}`);
            log(`Firebase auth: ${firebase.auth() ? '✅ Available' : '❌ MISSING'}`);
            
            if (window.API_CONFIG) {
                log('<strong>=== API Configuration ===</strong>');
                log(`Tier4 URL: ${window.API_CONFIG.TIER4_URL}`);
                log(`Tier6 URL: ${window.API_CONFIG.TIER6_URL}`);
            }
            
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    log(`<strong>=== Auth Status ===</strong>`);
                    log(`✅ User signed in: ${user.email}`);
                    log(`UID: ${user.uid}`);
                    log(`Display Name: ${user.displayName || 'Not set'}`);
                } else {
                    log(`<strong>=== Auth Status ===</strong>`);
                    log(`❌ No user signed in`, true);
                }
            });
        }, 500);
    </script>
</body>
</html>
