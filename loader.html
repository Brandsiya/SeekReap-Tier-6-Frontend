<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeekReap Processing</title>
<link rel="stylesheet" href="loader.css">

<style type="text/css">

body{
    background:#0b0f1a;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.loader-container{
    text-align:center;
    width:320px;
}

.logo{
    font-size:28px;
    margin-bottom:40px;
    letter-spacing:2px;
}

.scanner{
    position:relative;
    width:120px;
    height:120px;
    margin:auto;
}

.ring{
    width:120px;
    height:120px;
    border:4px solid rgba(0,255,200,0.2);
    border-top:4px solid #00ffc8;
    border-radius:50%;
    animation:spin 2s linear infinite;
}

.ring2{
    position:absolute;
    top:10px;
    left:10px;
    width:100px;
    height:100px;
    border:3px solid rgba(0,255,200,0.1);
    border-bottom:3px solid #00ffc8;
    border-radius:50%;
    animation:spinReverse 3s linear infinite;
}

.core{
    position:absolute;
    top:45px;
    left:45px;
    width:30px;
    height:30px;
    background:#00ffc8;
    border-radius:50%;
    box-shadow:0 0 20px #00ffc8;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

@keyframes spinReverse{
    100%{transform:rotate(-360deg);}
}

#status{
    margin-top:30px;
    font-size:14px;
    opacity:0.9;
}

.progress-bar{
    width:100%;
    height:6px;
    background:#1b2138;
    border-radius:5px;
    margin-top:20px;
    overflow:hidden;
}

.progress{
    width:0%;
    height:100%;
    background:#00ffc8;
    animation:progressMove 8s linear forwards;
}

@keyframes progressMove{
    100%{width:100%;}
}

.note{
    margin-top:12px;
    font-size:12px;
    opacity:0.6;
}

</style>

</head>

<body>

<div class="loader-container">

    <h1 class="logo">SeekReap</h1>

    <div class="scanner">
        <div class="ring"></div>
        <div class="ring2"></div>
        <div class="core"></div>
    </div>

    <p id="status">Initializing AI Analysis...</p>

    <div class="progress-bar">
        <div class="progress"></div>
    </div>

    <p class="note">
        Running monetization safety analysis.  
        This may take a few seconds.
    </p>

</div>

<script type="text/javascript">

const messages = [
"Scanning video structure...",
"Checking monetization policies...",
"Analyzing visual elements...",
"Evaluating audio patterns...",
"Detecting copyright signals...",
"Calculating monetization risk...",
"Preparing analysis report..."
];

let i = 0;

setInterval(()=>{
    document.getElementById("status").innerText = messages[i];
    i++;
    if(i >= messages.length){
        i = 0;
    }
},1200);

// Automatically redirect after 8.5 seconds (slightly longer than the progress bar animation)
setTimeout(() => {
    window.location.href = "index.html"; 
}, 8500);

</script>

</body>
</html>
