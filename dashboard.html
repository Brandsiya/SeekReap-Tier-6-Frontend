<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeekReap - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">SeekReap</a>
            <div class="nav-links">
                <a href="/" class="nav-link">Upload</a>
                <a href="/dashboard.html" class="nav-link active">Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="dashboard-card">
            <h1>Job Dashboard</h1>
            <div id="jobList" class="job-list">
                <div class="loading">Loading jobs...</div>
            </div>
        </div>
    </main>

    <script src="js/config.js?v=2"></script>
    <script>
        async function loadJobs() {
            try {
                // Try to get jobs from Tier-3 directly since Tier-4 doesn't have a list endpoint
                const response = await fetch(`https://seekreap-tier-3-private.onrender.com/api/jobs`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const jobs = await response.json();
                console.log('Received jobs:', jobs);

                const jobList = document.getElementById('jobList');

                if (!jobs || jobs.length === 0) {
                    jobList.innerHTML = '<div class="no-jobs">No jobs found</div>';
                    return;
                }

                jobList.innerHTML = jobs.map(job => `
                    <div class="job-item ${job.status || 'pending'}" onclick="window.location.href='/job.html?id=${job.job_id}'">
                        <h4>Job #${job.job_id} (${job.job_type || 'url'})</h4>
                        <p>Status: ${job.status || 'pending'}</p>
                        <p>Created: ${job.created_at ? new Date(job.created_at).toLocaleString() : 'Unknown'}</p>
                        ${job.completed_at ? `<p>Completed: ${new Date(job.completed_at).toLocaleString()}</p>` : ''}
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading jobs:', error);
                document.getElementById('jobList').innerHTML =
                    `<div class="error">Error loading jobs. Please try again.</div>`;
            }
        }

        loadJobs();
        setInterval(loadJobs, 10000);
    </script>
</body>
</html>
