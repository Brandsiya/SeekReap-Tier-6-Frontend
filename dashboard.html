<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeekReap | Audit Report</title>
    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>
    <div class="report-container">
        <header>
            <div class="brand">SEEKREAP <span class="tier-badge" id="display-tier">TIER ?</span></div>
            <div class="timestamp" id="display-date">SCAN DATE: --/--/----</div>
        </header>

        <section class="status-banner">
            <div class="glow-ring"></div>
            <h2>ANALYSIS COMPLETE</h2>
            <p>Monetization signals have been secured and audited.</p>
        </section>

        <main class="grid-layout">
            <div class="card data-box">
                <h3>FILE METADATA</h3>
                <ul id="metadata-list">
                    <li><span class="label">Source:</span> <span class="val" id="res-source">---</span></li>
                    <li><span class="label">Name:</span> <span class="val" id="res-name">---</span></li>
                    <li><span class="label">Size:</span> <span class="val" id="res-size">---</span></li>
                    <li><span class="label">Duration:</span> <span class="val" id="res-duration">---</span></li>
                </ul>
            </div>

            <div class="card signal-box">
                <h3>POLICY SCAN</h3>
                <div class="signal-item">
                    <span>Copyright Risk</span>
                    <div class="bar-bg"><div class="bar-fill green" style="width: 92%"></div></div>
                </div>
                <div class="signal-item">
                    <span>Ad-Suitability</span>
                    <div class="bar-bg"><div class="bar-fill blue" style="width: 85%"></div></div>
                </div>
            </div>
        </main>

        <footer>
            <button onclick="window.location.href='verification.html'" class="back-btn">NEW SCAN</button>
        </footer>
    </div>

    <script>
        const data = JSON.parse(sessionStorage.getItem('seekreap_results'));
        if (data) {
            document.getElementById('display-tier').innerText = `TIER ${data.tier || 5}`;
            document.getElementById('display-date').innerText = `SCAN DATE: ${new Date(data.timestamp).toLocaleDateString()}`;
            document.getElementById('res-source').innerText = data.source || 'Unknown';
            document.getElementById('res-name').innerText = data.name || 'External Link';
            document.getElementById('res-size').innerText = data.size || 'N/A';
            document.getElementById('res-duration').innerText = data.duration || 'N/A';
        } else {
            document.body.innerHTML = "<h1>No Scan Data Found. Please return to verification.</h1>";
        }
    </script>
</body>
</html>
